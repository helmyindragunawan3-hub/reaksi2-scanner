<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner QR</title>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

<style>
body { font-family: Arial; text-align:center; padding:20px; }
video { width:100%; max-width:400px; border-radius:12px; }
button { padding:12px; margin:5px; width:90%; font-size:16px; }
#hasil { margin-top:20px; font-weight:bold; }
</style>
</head>

<body>

<h2>QR Scanner</h2>

<video id="cam-video" autoplay playsinline></video>
<canvas id="cam-canvas" hidden></canvas>

<br>

<button onclick="aktifkan()">🎥 Aktifkan Kamera</button>
<button onclick="matikan()">⛔ Stop</button>
<button onclick="scanSekarang()">📸 Scan Sekarang</button>

<div id="hasil"></div>

<script>
var GAS_URL = "ISI_URL_GAS_KAMU"; // WAJIB
var PASS    = "123";              // WAJIB

var stream = null;
var scanning = false;
var processing = false;
var lastScan = 0;

// =======================
// AKTIFKAN KAMERA
// =======================
function aktifkan() {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  })
  .then(function(s){
    stream = s;
    var video = document.getElementById('cam-video');
    video.srcObject = stream;

    video.onloadedmetadata = function(){
      video.play();
      scanning = true;
      loopScan();
    };
  })
  .catch(function(e){
    tampil("Error kamera: " + e.message);
  });
}

// =======================
// STOP KAMERA
// =======================
function matikan() {
  if (stream) {
    stream.getTracks().forEach(t=>t.stop());
    stream = null;
  }
  scanning = false;
}

// =======================
// LOOP SCAN OTOMATIS
// =======================
function loopScan() {

  var video  = document.getElementById('cam-video');
  var canvas = document.getElementById('cam-canvas');
  var ctx    = canvas.getContext('2d');

  var interval = setInterval(function(){

    if (!scanning || processing) return;
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    var img = ctx.getImageData(0, 0, canvas.width, canvas.height);

    var code = jsQR(img.data, canvas.width, canvas.height);

    if (code && code.data) {

      var now = Date.now();
      if (now - lastScan < 1500) return;
      lastScan = now;

      processing = true;

      tampil("QR terbaca: " + code.data);

      proses(code.data);
    }

  }, 300);
}

// =======================
// SCAN MANUAL (SHUTTER)
// =======================
function scanSekarang() {

  if (!stream) {
    tampil("Aktifkan kamera dulu");
    return;
  }

  if (processing) return;

  var video  = document.getElementById('cam-video');
  var canvas = document.getElementById('cam-canvas');
  var ctx    = canvas.getContext('2d');

  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  var img = ctx.getImageData(0, 0, canvas.width, canvas.height);

  var code = jsQR(img.data, canvas.width, canvas.height);

  if (code && code.data) {
    processing = true;
    tampil("QR terbaca: " + code.data);
    proses(code.data);
  } else {
    tampil("QR tidak terbaca");
  }
}

// =======================
// PROSES KE GAS (JSONP)
// =======================
function proses(id) {

  tampil("Memproses: " + id);

  var cb = "cb_" + Date.now();

  window[cb] = function(res){
    tampil(JSON.stringify(res));
    processing = false;
    delete window[cb];
  };

  var script = document.createElement("script");

  script.src = GAS_URL +
    "?action=serverScanQR" +
    "&id=" + encodeURIComponent(id) +
    "&pass=" + PASS +
    "&callback=" + cb;

  script.onerror = function(){
    tampil("Gagal koneksi ke GAS");
    processing = false;
  };

  document.body.appendChild(script);
}

// =======================
// OUTPUT
// =======================
function tampil(msg){
  document.getElementById("hasil").innerText = msg;
}
</script>

</body>
</html>
