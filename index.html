<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Scanner QR — REAKSI 2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0f1c35;
     min-height:100vh;padding:20px;color:#fff}
.hdr{text-align:center;margin-bottom:20px;padding-top:4px}
.hdr h1{font-size:20px;font-weight:700;color:#c9a84c}
.hdr p{font-size:12px;color:#8899bb;margin-top:3px}

.login-card{max-width:340px;margin:20px auto;
            background:#1a2744;border-radius:14px;padding:28px}
.login-card h2{color:#c9a84c;margin-bottom:6px;font-size:17px}
.login-card p{color:#8899bb;font-size:13px;margin-bottom:18px}
input[type=password],input[type=text]{
  width:100%;padding:10px 13px;border:1px solid #2d4070;
  border-radius:8px;font-size:15px;background:#0f1c35;
  color:#fff;margin-bottom:10px}
input::placeholder{color:#445}
.btn-primary{width:100%;padding:12px;background:#c9a84c;
             color:#1a2744;border:none;border-radius:8px;
             font-size:15px;font-weight:700;cursor:pointer}
.btn-primary:disabled{background:#555;color:#999;cursor:not-allowed}
.err-txt{color:#f87171;font-size:13px;margin-bottom:10px;
         display:none;background:rgba(255,0,0,.1);
         padding:8px 12px;border-radius:6px}

#wrap-scan{max-width:400px;margin:0 auto}

.cam-wrap{position:relative;width:100%;aspect-ratio:1;
          border-radius:12px;overflow:hidden;
          background:#000;margin-bottom:12px}
#cam-video{width:100%;height:100%;object-fit:cover;display:block}
.cam-overlay{position:absolute;inset:0;display:flex;
             align-items:center;justify-content:center;pointer-events:none}
.cam-frame{width:220px;height:220px;border:3px solid #c9a84c;
           border-radius:12px;
           box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
.scan-line{position:absolute;width:200px;height:2px;
           background:rgba(201,168,76,.8);
           animation:scanMove 2s ease-in-out infinite}
@keyframes scanMove{
  0%  {top:calc(50% - 100px)}
  50% {top:calc(50% + 98px)}
  100%{top:calc(50% - 100px)}
}
canvas{display:none}

.cam-toggle{display:flex;gap:8px;margin-bottom:10px}
.btn-cam{flex:1;padding:9px;border-radius:8px;
         border:1px solid #2d4070;background:#1a2744;
         color:#c9a84c;font-size:13px;font-weight:600;cursor:pointer}
.btn-cam.on{background:#c9a84c;color:#1a2744;border-color:#c9a84c}
.btn-cam:disabled{background:#1a2744;color:#445;
                  border-color:#2d4070;cursor:not-allowed}

.sts{text-align:center;font-size:12px;color:#8899bb;
     margin-bottom:10px;min-height:16px}
.sts.ok {color:#4ade80}
.sts.err{color:#f87171}

.manual-row{display:flex;gap:8px;margin-bottom:14px}
.manual-row input{flex:1;margin-bottom:0}
.btn-cek{padding:10px 18px;background:#c9a84c;color:#1a2744;
         border:none;border-radius:8px;font-size:14px;
         font-weight:700;cursor:pointer}
.btn-cek:disabled{background:#555;color:#999;cursor:not-allowed}

.rcard{border-radius:14px;padding:20px;margin-top:4px;
       animation:fadeIn .25s ease}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(6px)}
  to  {opacity:1;transform:none}
}
.rcard.ok  {background:#071f0f;border:1.5px solid #166534}
.rcard.warn{background:#1f1200;border:1.5px solid #7c3d12}
.rcard.fail{background:#1f0707;border:1.5px solid #7f1d1d}
.r-icon{font-size:32px;text-align:center;margin-bottom:8px}
.r-nama{font-size:19px;font-weight:700;text-align:center;margin-bottom:3px}
.r-nama.ok  {color:#4ade80}
.r-nama.warn{color:#fb923c}
.r-nama.fail{color:#f87171}
.r-sub{font-size:13px;color:#aaa;text-align:center;margin-bottom:12px}
.r-info{background:rgba(255,255,255,.05);border-radius:8px;
        padding:12px;font-size:13px;line-height:2;color:#ccc}
.r-info b{color:#fff}

.merch-box{margin-top:12px;padding:14px;
           background:rgba(201,168,76,.08);
           border:1px solid rgba(201,168,76,.2);
           border-radius:10px}
.m-title{font-size:11px;color:#8899bb;text-transform:uppercase;
         letter-spacing:1px;margin-bottom:8px}
.m-paket{font-size:17px;font-weight:700;color:#c9a84c;margin-bottom:2px}
.m-harga{font-size:13px;color:#8899bb;margin-bottom:10px}
.m-sts{display:inline-flex;align-items:center;gap:6px;
       padding:6px 14px;border-radius:7px;font-size:13px;font-weight:700}
.m-sts.lunas{background:#071f0f;color:#4ade80;border:1px solid #166534}
.m-sts.belum{background:#2e0e00;color:#fb923c;border:1px solid #7c2d12}
.m-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.m-dot.lunas{background:#4ade80}
.m-dot.belum{background:#fb923c}
.m-note{margin-top:8px;font-size:12px;color:#fb923c;line-height:1.5}

.btn-next{width:100%;margin-top:14px;padding:12px;
          background:#1a2744;color:#c9a84c;
          border:1.5px solid #c9a84c;border-radius:9px;
          font-size:14px;font-weight:700;cursor:pointer}
.hidden{display:none}
</style>
</head>
<body>

<div class="hdr">
  <h1>REAKSI 2 — Scanner</h1>
  <p>Verifikasi kehadiran peserta hari H</p>
</div>

<!-- Step 1: Isi URL GAS -->
<div id="wrap-setup">
  <div class="login-card">
    <h2>Setup Scanner</h2>
    <p>Masukkan URL deployment GAS kamu (URL /exec).</p>
    <input type="text" id="gas-url"
           placeholder="https://script.google.com/macros/s/.../exec">
    <div class="err-txt" id="err-setup"></div>
    <button class="btn-primary" onclick="simpanSetup()">Lanjut</button>
  </div>
</div>

<!-- Step 2: Login password -->
<div id="wrap-login" class="hidden">
  <div class="login-card">
    <h2>Login Panitia</h2>
    <p>Masukkan password scanner.</p>
    <input type="password" id="pass-in"
           placeholder="Password scanner"
           onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err-txt" id="err-login"></div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">
      Masuk
    </button>
  </div>
</div>

<!-- Step 3: Scanner -->
<div id="wrap-scan" class="hidden">
  <div class="cam-toggle">
    <button class="btn-cam" id="btn-on"  onclick="aktifkan()">
      📷 Aktifkan Kamera
    </button>
    <button class="btn-cam" id="btn-off"
            onclick="matikan()" disabled>
      ⏹ Stop
    </button>
  </div>

  <div class="cam-wrap">
    <video id="cam-video" autoplay playsinline muted></video>
    <div class="cam-overlay">
      <div class="cam-frame"></div>
      <div class="scan-line"></div>
    </div>
  </div>
  <canvas id="cam-canvas"></canvas>

  <div class="sts" id="sts">Tekan Aktifkan Kamera untuk mulai</div>

  <div class="manual-row">
    <input type="text" id="manual-id"
           placeholder="Atau ketik ID tiket manual...">
    <button class="btn-cek" id="btn-cek" onclick="cekManual()">Cek</button>
  </div>

  <div id="hasil"></div>
</div>

<script>
// ─── State ───────────────────────────────────────
var GAS_URL  = localStorage.getItem('reaksi2_gas_url') || '';
var PASS     = '';
var stream   = null;
var loopId   = null;
var bisaScan = true;

// ─── Setup ───────────────────────────────────────
if (GAS_URL) {
  document.getElementById('gas-url').value = GAS_URL;
  document.getElementById('wrap-setup').classList.add('hidden');
  document.getElementById('wrap-login').classList.remove('hidden');
}

function simpanSetup() {
  var url = document.getElementById('gas-url').value.trim();
  var err = document.getElementById('err-setup');
  if (!url || url.indexOf('script.google.com') === -1) {
    err.textContent   = 'URL tidak valid. Harus dari script.google.com';
    err.style.display = 'block';
    return;
  }
  GAS_URL = url;
  localStorage.setItem('reaksi2_gas_url', GAS_URL);
  document.getElementById('wrap-setup').classList.add('hidden');
  document.getElementById('wrap-login').classList.remove('hidden');
}

// ─── Login ───────────────────────────────────────
function doLogin() {
  var p   = document.getElementById('pass-in').value.trim();
  var btn = document.getElementById('btn-login');
  var err = document.getElementById('err-login');
  if (!p) return;
  btn.disabled = true; btn.textContent = 'Memeriksa...';
  err.style.display = 'none';

  callGAS('serverCekPass', [p, 'scanner'], function(res) {
    if (res && res.ok) {
      PASS = p;
      document.getElementById('wrap-login').classList.add('hidden');
      document.getElementById('wrap-scan').classList.remove('hidden');
    } else {
      err.textContent   = (res && res.msg) ? res.msg : 'Password salah.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Masuk';
    }
  }, function(e) {
    err.textContent   = 'Tidak bisa konek ke server: ' + e;
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Masuk';
  });
}

// ─── Kamera ──────────────────────────────────────
function aktifkan() {
  setSts('Meminta izin kamera...', '');
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
  })
  .then(function(s) {
    stream = s;
    var v  = document.getElementById('cam-video');
    v.srcObject = stream;
    v.play();
    bisaScan = true;
    document.getElementById('btn-on').disabled  = true;
    document.getElementById('btn-off').disabled = false;
    document.getElementById('btn-off').classList.add('on');
    setSts('Arahkan kamera ke QR Code', '');
    mulaiLoop();
  })
  .catch(function(err) {
    var msg =
      err.name === 'NotAllowedError'
        ? 'Izin kamera ditolak — tap ikon kunci/kamera di address bar, izinkan, lalu refresh.'
      : err.name === 'NotFoundError'
        ? 'Kamera tidak ditemukan.'
      : 'Error kamera: ' + err.message;
    setSts(msg, 'err');
  });
}

function matikan() {
  if (stream) { stream.getTracks().forEach(function(t){t.stop();}); stream = null; }
  if (loopId) { clearInterval(loopId); loopId = null; }
  document.getElementById('cam-video').srcObject = null;
  document.getElementById('btn-on').disabled  = false;
  document.getElementById('btn-off').disabled = true;
  document.getElementById('btn-off').classList.remove('on');
  setSts('Kamera dimatikan', '');
}

function mulaiLoop() {
  var video  = document.getElementById('cam-video');
  var canvas = document.getElementById('cam-canvas');
  var ctx    = canvas.getContext('2d');
  loopId = setInterval(function() {
    if (!bisaScan) return;
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    var img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var code = jsQR(img.data, img.width, img.height,
                    { inversionAttempts: 'dontInvert' });
    if (code && code.data) {
      bisaScan = false;
      setSts('QR terdeteksi — memeriksa...', '');
      prosesId(code.data);
    }
  }, 250);
}

// ─── Manual ──────────────────────────────────────
function cekManual() {
  var id = document.getElementById('manual-id').value.trim();
  if (!id) return;
  document.getElementById('btn-cek').disabled = true;
  prosesId(id);
}

// ─── Proses ID ───────────────────────────────────
function prosesId(id) {
  document.getElementById('hasil').innerHTML =
    '<div style="text-align:center;color:#8899bb;padding:24px;font-size:14px">'
    + 'Memeriksa ' + id + '...</div>';

  callGAS('serverScanQR', [PASS, id], tampilHasil, function(e) {
    tampilHasil({ ok: false, msg: 'Error koneksi: ' + e });
  });
}

// ─── Tampil hasil ────────────────────────────────
function tampilHasil(res) {
  var html = '';

  if (res.ok) {
    var p = res.peserta;
    html =
      '<div class="rcard ok">'
      + '<div class="r-icon">✅</div>'
      + '<div class="r-nama ok">' + p.nama + '</div>'
      + '<div class="r-sub">Angkatan ' + p.tahunLulus
        + ' &nbsp;·&nbsp; ' + p.idPeserta + '</div>'
      + '<div class="r-info">'
      + '<b>Status:</b> HADIR ✓<br>'
      + '<b>Email:</b> ' + p.email + '<br>'
      + '<b>Merch:</b> ' + (p.beliMerch === 'YA' ? 'Ya' : 'Tidak')
      + '</div>'
      + buatMerchBox(res.order)
      + '<button class="btn-next" onclick="resetScan()">Scan Berikutnya ›</button>'
      + '</div>';
    setSts('✓ Valid', 'ok');

  } else if (res.msg === 'Tiket sudah digunakan!') {
    var p = res.peserta || {};
    html =
      '<div class="rcard warn">'
      + '<div class="r-icon">⚠️</div>'
      + '<div class="r-nama warn">Tiket Sudah Digunakan</div>'
      + '<div class="r-sub">'
        + (p.nama || '') + ' — ' + (p.idPeserta || '')
      + '</div>'
      + '<div class="r-info" style="color:#fb923c">'
      + 'Tiket ini sudah di-scan sebelumnya.<br>'
      + '<b>Tidak bisa digunakan lagi.</b>'
      + '</div>'
      + buatMerchBox(res.order)
      + '<button class="btn-next" onclick="resetScan()">Scan Berikutnya ›</button>'
      + '</div>';
    setSts('⚠ Tiket sudah digunakan', '');

  } else {
    html =
      '<div class="rcard fail">'
      + '<div class="r-icon">❌</div>'
      + '<div class="r-nama fail">Tidak Valid</div>'
      + '<div class="r-sub">' + (res.msg || 'ID tidak ditemukan') + '</div>'
      + '<button class="btn-next" onclick="resetScan()">Coba Lagi ›</button>'
      + '</div>';
    setSts('✗ Tidak valid', 'err');
  }

  document.getElementById('hasil').innerHTML = html;
}

function buatMerchBox(order) {
  if (!order) return '';
  var isLunas = order.statusBayar === 'LUNAS';
  var cls     = isLunas ? 'lunas' : 'belum';
  var stsTxt  = isLunas ? '✓ LUNAS' : '⚠ BELUM LUNAS';
  var note    = isLunas ? ''
    : '<div class="m-note">Ingatkan peserta menyelesaikan pembayaran.</div>';
  return '<div class="merch-box">'
    + '<div class="m-title">Merchandise dipesan</div>'
    + '<div class="m-paket">' + (order.paketNama || order.paketId) + '</div>'
    + '<div class="m-harga">Rp '
      + Number(order.harga).toLocaleString('id') + '</div>'
    + '<div class="m-sts ' + cls + '">'
    + '<div class="m-dot ' + cls + '"></div>'
    + stsTxt + '</div>'
    + note + '</div>';
}

function resetScan() {
  document.getElementById('hasil').innerHTML = '';
  document.getElementById('manual-id').value = '';
  document.getElementById('btn-cek').disabled = false;
  bisaScan = true;
  setSts('Arahkan kamera ke QR Code', '');
}

function setSts(txt, cls) {
  var el      = document.getElementById('sts');
  el.textContent = txt;
  el.className   = 'sts' + (cls ? ' ' + cls : '');
}

// ─── Call GAS via fetch ───────────────────────────
// Scanner ini hosted di GitHub Pages, bukan di GAS
// Jadi kita panggil GAS sebagai API via URL parameter
function callGAS(fn, params, onSuccess, onError) {
  var url = GAS_URL
    + '?call=' + encodeURIComponent(fn)
    + '&params=' + encodeURIComponent(JSON.stringify(params));

  // Pakai no-cors tidak bisa baca response
  // Solusi: pakai JSONP via script tag injection
  var cbName = 'cb_' + Date.now();
  var script = document.createElement('script');

  window[cbName] = function(data) {
    delete window[cbName];
    document.body.removeChild(script);
    onSuccess(data);
  };

  script.onerror = function() {
    delete window[cbName];
    document.body.removeChild(script);
    onError('Gagal konek ke server.');
  };

  script.src = url + '&callback=' + cbName;
  document.body.appendChild(script);
}
