<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Scanner QR — REAKSI 2</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0f1c35;min-height:100vh;padding:20px;color:#fff}
.hdr{text-align:center;margin-bottom:20px;padding-top:4px}
.hdr h1{font-size:20px;font-weight:700;color:#c9a84c}
.hdr p{font-size:12px;color:#8899bb;margin-top:3px}
.card{max-width:340px;margin:20px auto;background:#1a2744;border-radius:14px;padding:28px}
.card h2{color:#c9a84c;margin-bottom:6px;font-size:17px}
.card p{color:#8899bb;font-size:13px;margin-bottom:18px}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #2d4070;background:#0f1c35;color:#fff}
.btn-p{width:100%;padding:12px;background:#c9a84c;color:#1a2744;border:none;border-radius:8px;font-weight:700}
.err{color:#f87171;font-size:13px;margin-top:8px}
#wrap-scan{max-width:400px;margin:0 auto}
.cam-wrap{position:relative;border-radius:12px;overflow:hidden;background:#000;margin-bottom:12px}
#cam-video{width:100%}
.sts{text-align:center;font-size:12px;color:#8899bb;margin-bottom:10px}
.btn-cek{padding:10px;background:#c9a84c;color:#1a2744;border:none;border-radius:8px;font-weight:700;width:100%}
.loading{text-align:center;padding:20px}
.hidden{display:none}
</style>
</head>

<body>

<div class="hdr">
  <h1>REAKSI 2 — Scanner</h1>
  <p>Verifikasi kehadiran peserta hari H</p>
</div>

<!-- SETUP -->
<div id="wrap-setup">
  <div class="card">
    <h2>Setup</h2>
    <input type="text" id="gas-url" placeholder="URL GAS">
    <button class="btn-p" onclick="simpanSetup()">Lanjut</button>
    <div id="err-setup" class="err"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="wrap-login" class="hidden">
  <div class="card">
    <h2>Login</h2>
    <input type="password" id="pass-in" placeholder="Password">
    <button class="btn-p" onclick="doLogin()">Masuk</button>
    <div id="err-login" class="err"></div>
  </div>
</div>

<!-- SCANNER -->
<div id="wrap-scan" class="hidden">

  <button class="btn-cek" onclick="aktifkan()">📷 Aktifkan Kamera</button>

  <div class="cam-wrap">
    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="cam-canvas" style="display:none"></canvas>
  </div>

  <div id="sts" class="sts">Siap</div>

  <input type="text" id="manual-id" placeholder="Manual ID">
  <button class="btn-cek" onclick="cekManual()">Cek Manual</button>

  <!-- 🔥 SHUTTER -->
  <button class="btn-cek" style="margin-top:10px" onclick="scanSekarang()">
    📸 Scan Sekarang
  </button>

  <div id="hasil"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.js"></script>

<script>
var GAS_URL='', PASS='', stream=null, loopId=null;
var bisaScan=true, sedangProses=false, lastScan=0, jsonpN=0;

// INIT
(function(){
  var saved=localStorage.getItem('reaksi2_url');
  if(saved){GAS_URL=saved; tampilStep('login')}
  else tampilStep('setup');
})();

function tampilStep(s){
  ['setup','login','scan'].forEach(x=>{
    document.getElementById('wrap-'+x).classList.add('hidden')
  });
  document.getElementById('wrap-'+s).classList.remove('hidden');
}

// SETUP
function simpanSetup(){
  var url=document.getElementById('gas-url').value;
  if(!url) return;
  GAS_URL=url;
  localStorage.setItem('reaksi2_url',url);
  tampilStep('login');
}

// LOGIN
function doLogin(){
  var p=document.getElementById('pass-in').value;
  PASS=p;
  tampilStep('scan');
}

// KAMERA
function aktifkan(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  .then(s=>{
    stream=s;
    var v=document.getElementById('cam-video');
    v.srcObject=s;
    v.play();
    mulaiLoop();
  });
}

// LOOP SCAN
function mulaiLoop(){
  var v=document.getElementById('cam-video');
  var c=document.getElementById('cam-canvas');
  var ctx=c.getContext('2d',{willReadFrequently:true});

  loopId=setInterval(()=>{
    if(!bisaScan||sedangProses||!stream) return;
    if(v.readyState!==v.HAVE_ENOUGH_DATA) return;

    var w=v.videoWidth,h=v.videoHeight;
    if(!w) return;

    var size=Math.min(w,h)*0.7;
    var sx=(w-size)/2, sy=(h-size)/2;

    c.width=size; c.height=size;
    ctx.drawImage(v,sx,sy,size,size,0,0,size,size);

    var img=ctx.getImageData(0,0,size,size);
    var code=jsQR(img.data,size,size,{inversionAttempts:"attemptBoth"});

    if(code&&code.data){
      var now=Date.now();
      if(now-lastScan<1500)return;
      lastScan=now;

      bisaScan=false;
      sedangProses=true;

      setSts("QR terbaca ✓","ok");

      setTimeout(()=>prosesId(code.data.trim()),250);
    }
  },200);
}

// SHUTTER
function scanSekarang(){
  if(!stream||sedangProses)return;

  var v=document.getElementById('cam-video');
  var c=document.getElementById('cam-canvas');
  var ctx=c.getContext('2d',{willReadFrequently:true});

  var w=v.videoWidth,h=v.videoHeight;
  var size=Math.min(w,h)*0.7;

  c.width=size; c.height=size;
  ctx.drawImage(v,(w-size)/2,(h-size)/2,size,size,0,0,size,size);

  var img=ctx.getImageData(0,0,size,size);
  var code=jsQR(img.data,size,size,{inversionAttempts:"attemptBoth"});

  if(code&&code.data){
    bisaScan=false;
    sedangProses=true;
    setSts("QR terbaca ✓","ok");
    setTimeout(()=>prosesId(code.data.trim()),200);
  }else{
    setSts("Gagal baca QR","er");
  }
}

// PROSES
function prosesId(id){
  document.getElementById('hasil').innerHTML=
    '<div class="loading">Memeriksa '+id+'...</div>';

  callGAS('serverScanQR',[PASS,id],
    res=>{tampilHasil(res);reset();},
    e=>{tampilHasil({ok:false,msg:e});reset();}
  );
}

function reset(){
  setTimeout(()=>{
    bisaScan=true;
    sedangProses=false;
    setSts("Siap scan","");
  },1500);
}

// UI
function setSts(t,c){
  var el=document.getElementById('sts');
  el.textContent=t;
  el.className='sts '+(c||'');
}

function tampilHasil(res){
  document.getElementById('hasil').innerHTML=
    '<div class="loading">'+(res.msg||'OK')+'</div>';
}

function cekManual(){
  prosesId(document.getElementById('manual-id').value);
}

// JSONP
function callGAS(fn,params,onSuccess,onError){
  var cb='cb'+Date.now();
  window[cb]=data=>{onSuccess(data);delete window[cb]};
  var s=document.createElement('script');
  s.src=GAS_URL+'?call='+fn+'&params='+encodeURIComponent(JSON.stringify(params))+'&callback='+cb;
  s.onerror=()=>onError('Gagal konek');
  document.body.appendChild(s);
}
</script>

</body>
</html>
